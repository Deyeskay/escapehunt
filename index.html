<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Escape Hunt Ultimate</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
    -webkit-tap-highlight-color:transparent;
}

body{
    min-height:100vh;
    background:
        radial-gradient(circle at top left,#7c3aed,#111827 35%),
        radial-gradient(circle at bottom right,#0891b2,#111827 35%);
    display:flex;
    justify-content:center;
    padding:18px;
    overflow-y:auto;
    color:white;
}

.card{
    width:100%;
    max-width:620px;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(18px);
    border:1px solid rgba(255,255,255,0.08);
    border-radius:32px;
    padding:24px;
    margin-top:20px;
    margin-bottom:40px;
    box-shadow:0 10px 40px rgba(0,0,0,0.4);
}

.title{
    text-align:center;
    font-size:40px;
    font-weight:bold;
    margin-bottom:12px;
}

.subtitle{
    text-align:center;
    opacity:0.8;
    line-height:1.5;
    margin-bottom:24px;
}

.complete{
    font-size:72px;
    text-align:center;
    margin-bottom:12px;
}

.topbar{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    justify-content:space-between;
    margin-bottom:20px;
}

.stat{
    background:rgba(255,255,255,0.08);
    padding:12px 16px;
    border-radius:16px;
    font-size:14px;
}

.hintBox{
    background:rgba(255,255,255,0.08);
    border-radius:24px;
    padding:22px;
    margin-bottom:20px;
    font-size:22px;
    text-align:center;
    line-height:1.6;
    overflow:hidden;
}

.hintImage{
    width:100%;
    border-radius:18px;
    margin-bottom:16px;
}

.bonusHint{
    margin-top:16px;
    background:rgba(255,255,255,0.08);
    padding:14px;
    border-radius:16px;
    color:#fde68a;
    font-size:15px;
}

input,
textarea{
    width:100%;
    border:none;
    outline:none;
    border-radius:18px;
    background:rgba(255,255,255,0.1);
    color:white;
    padding:16px;
    font-size:16px;
    margin-bottom:15px;
}

textarea{
    min-height:90px;
    resize:vertical;
}

input::placeholder,
textarea::placeholder{
    color:rgba(255,255,255,0.6);
}

button{
    width:100%;
    border:none;
    border-radius:18px;
    padding:16px;
    font-size:16px;
    cursor:pointer;
    margin-top:10px;
    transition:0.2s;
    font-weight:bold;
}

button:hover{
    transform:translateY(-2px);
}

button:disabled{
    opacity:0.5;
    cursor:not-allowed;
    transform:none;
}

.primary{
    background:linear-gradient(135deg,#8b5cf6,#06b6d4);
    color:white;
}

.secondary{
    background:rgba(255,255,255,0.12);
    color:white;
}

.danger{
    background:linear-gradient(135deg,#dc2626,#ef4444);
    color:white;
}

.row{
    background:rgba(255,255,255,0.06);
    border-radius:24px;
    padding:18px;
    margin-bottom:20px;
}

.rowTitle{
    font-size:22px;
    font-weight:bold;
    margin-bottom:12px;
}

.message{
    text-align:center;
    min-height:24px;
    margin-top:15px;
}

.success{
    color:#4ade80;
}

.error{
    color:#fb7185;
}

.settingsBox{
    background:rgba(255,255,255,0.06);
    border-radius:24px;
    padding:18px;
    margin-bottom:20px;
}

.modal{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.75);
    display:none;
    justify-content:center;
    align-items:center;
    padding:20px;
    z-index:9999;
}

.modalBox{
    width:100%;
    max-width:400px;
    background:#111827;
    border-radius:24px;
    padding:24px;
}

#secretBtn{
    position:fixed;
    right:8px;
    bottom:8px;
    width:24px;
    height:24px;
    border-radius:50%;
    background:white;
    opacity:0.04;
    z-index:999;
}

.previewImg{
    width:100%;
    border-radius:18px;
    margin-top:10px;
}

.hidden{
    display:none;
}

.musicBtn{
    cursor:pointer;
}

.small{
    opacity:0.7;
    font-size:13px;
    text-align:center;
    margin-top:15px;
}

.fade{
    animation:fade 0.3s ease;
}

@keyframes fade{
    from{
        opacity:0;
        transform:translateY(10px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

</style>
</head>

<body>

<div class="card fade">
    <div id="app"></div>
</div>

<div id="secretBtn"></div>

<div class="modal" id="adminModal">

    <div class="modalBox">

        <div class="title" style="font-size:28px;">
            Secret Access
        </div>

        <input
            type="password"
            id="modalPin"
            placeholder="Enter PIN"
        >

        <div id="pinMsg" class="message"></div>

        <button class="primary" onclick="verifyPin()">
            Open Admin
        </button>

        <button class="danger" onclick="showDeleteModal()">
            Delete Game
        </button>

        <button class="secondary" onclick="closeModal()">
            Close
        </button>

    </div>

</div>

<div class="modal" id="deleteModal">

    <div class="modalBox">

        <div class="title" style="font-size:28px;">
            Delete Game?
        </div>

        <div class="subtitle">
            This action cannot be undone
        </div>

        <button class="danger" onclick="deleteEverything()">
            Yes Delete
        </button>

        <button class="secondary" onclick="closeDeleteModal()">
            Cancel
        </button>

    </div>

</div>

<input
    type="file"
    id="importFile"
    class="hidden"
    accept=".ehunt"
>

<script>

/* =========================================================
   STORAGE KEYS
========================================================= */

const GAME_KEY = "ehunt_data";
const SETTINGS_KEY = "ehunt_settings";
const PIN_KEY = "ehunt_pin";
const PROGRESS_KEY = "ehunt_progress";
const HINT_KEY = "ehunt_hints";
const TIMER_KEY = "ehunt_timer";
const STARTED_KEY = "ehunt_started";
const SCREEN_HINTS_KEY = "ehunt_screen_hints";

/* =========================================================
   SAFE STORAGE
========================================================= */

function safeParse(key, fallback){

    try{

        const value = localStorage.getItem(key);

        return value
            ? JSON.parse(value)
            : fallback;

    }catch(e){

        return fallback;
    }
}

/* =========================================================
   STATE
========================================================= */

let gameData = safeParse(GAME_KEY,[]);
let settings = safeParse(SETTINGS_KEY,{});
let savedPin = localStorage.getItem(PIN_KEY) || "";
let progress = parseInt(localStorage.getItem(PROGRESS_KEY)) || 0;
let usedHints = parseInt(localStorage.getItem(HINT_KEY)) || 0;
let timerSeconds = parseInt(localStorage.getItem(TIMER_KEY)) || 0;
let gameStarted = localStorage.getItem(STARTED_KEY) === "true";

let screenHintsUsed =
    safeParse(SCREEN_HINTS_KEY,{});

const app = document.getElementById("app");

let timerInterval = null;

/* =========================================================
   MUSIC
========================================================= */

let bgMusic = new Audio("bg.mp3");

bgMusic.loop = true;
bgMusic.volume = 0.4;

function startMusic(){

    bgMusic.play()
    .then(()=>{})
    .catch(err=>{

        console.log("Music blocked:", err);
    });
}

function stopMusic(){

    bgMusic.pause();

    bgMusic.currentTime = 0;
}

function toggleMusic(){

    if(!bgMusic.paused){

        stopMusic();

    }else{

        startMusic();
    }

    if(gameStarted){

        loadGame();

    }else{

        showStartScreen();
    }
}

/* =========================================================
   SOUND FX
========================================================= */

function successSound(){

    const ctx =
        new(window.AudioContext ||
        window.webkitAudioContext)();

    const osc = ctx.createOscillator();
    const gain = ctx.createGain();

    osc.type = "triangle";

    osc.frequency.setValueAtTime(
        350,
        ctx.currentTime
    );

    osc.frequency.linearRampToValueAtTime(
        1100,
        ctx.currentTime + 0.35
    );

    gain.gain.setValueAtTime(
        0.2,
        ctx.currentTime
    );

    gain.gain.exponentialRampToValueAtTime(
        0.001,
        ctx.currentTime + 0.5
    );

    osc.connect(gain);
    gain.connect(ctx.destination);

    osc.start();
    osc.stop(ctx.currentTime + 0.5);
}

function wrongSound(){

    const ctx =
        new(window.AudioContext ||
        window.webkitAudioContext)();

    const osc = ctx.createOscillator();
    const gain = ctx.createGain();

    osc.type = "sawtooth";
    osc.frequency.value = 180;

    gain.gain.setValueAtTime(
        0.15,
        ctx.currentTime
    );

    gain.gain.exponentialRampToValueAtTime(
        0.001,
        ctx.currentTime + 0.25
    );

    osc.connect(gain);
    gain.connect(ctx.destination);

    osc.start();
    osc.stop(ctx.currentTime + 0.25);
}

/* =========================================================
   INIT
========================================================= */

if(gameData.length === 0 || savedPin === ""){

    createPinScreen();

}else{

    if(gameStarted){

        loadGame();
        startTimer();

    }else{

        showStartScreen();
    }
}

/* =========================================================
   TIMER
========================================================= */

function startTimer(){

    clearInterval(timerInterval);

    timerInterval = setInterval(()=>{

        if(settings.timerEnabled){

            timerSeconds--;

            if(timerSeconds <= 0){

                timerSeconds = 0;

                localStorage.setItem(
                    TIMER_KEY,
                    timerSeconds
                );

                clearInterval(timerInterval);

                showTimeOver();

                return;
            }

        }else{

            timerSeconds++;
        }

        localStorage.setItem(
            TIMER_KEY,
            timerSeconds
        );

        updateTimer();

    },1000);
}

function stopTimer(){

    clearInterval(timerInterval);
}

function formatTime(seconds){

    const hrs =
        Math.floor(seconds / 3600);

    const mins =
        Math.floor((seconds % 3600) / 60);

    const secs =
        seconds % 60;

    if(hrs > 0){

        return `${String(hrs).padStart(2,"0")}:${String(mins).padStart(2,"0")}:${String(secs).padStart(2,"0")}`;
    }

    return `${String(mins).padStart(2,"0")}:${String(secs).padStart(2,"0")}`;
}

function updateTimer(){

    const el =
        document.getElementById("timerDisplay");

    if(!el) return;

    el.innerHTML =
        `⏳ ${formatTime(timerSeconds)}`;
}

/* =========================================================
   SECRET MODAL
========================================================= */

document.getElementById("secretBtn")
.onclick = ()=>{

    document.getElementById("adminModal")
    .style.display = "flex";

    document.getElementById("modalPin")
    .value = "";

    document.getElementById("pinMsg")
    .innerHTML = "";
};

function closeModal(){

    document.getElementById("adminModal")
    .style.display = "none";
}

function verifyPin(){

    const pin =
        document.getElementById("modalPin")
        .value
        .trim();

    const msg =
        document.getElementById("pinMsg");

    if(pin === savedPin){

        closeModal();

        openAdminPanel();

    }else{

        msg.className =
            "message error";

        msg.innerHTML =
            "Wrong PIN";
    }
}

function showDeleteModal(){

    document.getElementById("deleteModal")
    .style.display = "flex";
}

function closeDeleteModal(){

    document.getElementById("deleteModal")
    .style.display = "none";
}

/* =========================================================
   PIN SCREEN
========================================================= */

function createPinScreen(){

    app.innerHTML = `

        <div class="title">
            Escape Hunt
        </div>

        <div class="subtitle">
            Create your own mystery puzzle game
        </div>

        <input
            type="password"
            id="newPin"
            placeholder="Create Secret PIN"
        >

        <button
            class="primary"
            onclick="startSetup()"
        >
            Continue
        </button>

        <button
            class="secondary"
            onclick="triggerImport()"
        >
            Import .ehunt
        </button>
    `;
}

function startSetup(){

    const pin =
        document.getElementById("newPin")
        .value
        .trim();

    if(pin === ""){

        alert("Create PIN");

        return;
    }

    savedPin = pin;

    localStorage.setItem(
        PIN_KEY,
        savedPin
    );

    openAdminPanel();
}

/* =========================================================
   ADMIN PANEL
========================================================= */

function openAdminPanel(){

    app.innerHTML = `

        <div class="title">
            Setup Screens
        </div>

        <div class="settingsBox">

            <label>
                <input
                    type="checkbox"
                    id="timerMode"

                    ${
                        settings.timerEnabled
                        ? "checked"
                        : ""
                    }

                    onchange="toggleTimerInput()"
                >
                Enable Countdown Timer
            </label>

            <div id="timerInputBox">

                <input
                    type="number"
                    id="gameMinutes"
                    placeholder="Countdown Minutes"
                    value="${
                        settings.gameMinutes || 30
                    }"
                >

            </div>

            <input
                type="number"
                id="hintCount"
                placeholder="Usable Hint Count"
                value="${
                    settings.totalHints || 3
                }"
            >

        </div>

        <div id="rows"></div>

        <button
            class="secondary"
            onclick="addRow()"
        >
            + Add Screen
        </button>

        <button
            class="primary"
            onclick="saveGame()"
        >
            Save Game
        </button>

        <button
            class="secondary"
            onclick="exportGame()"
        >
            Export .ehunt
        </button>

        <button
            class="secondary"
            onclick="triggerImport()"
        >
            Import .ehunt
        </button>

        <button
            class="danger"
            onclick="deleteFromSetup()"
        >
            Delete Game
        </button>

        <div class="small">
            Hidden admin access enabled
        </div>
    `;

    if(gameData.length === 0){

        addRow();
        addRow();

    }else{

        gameData.forEach(item=>{
            addRow(item);
        });
    }

    toggleTimerInput();
}

function toggleTimerInput(){

    const checked =
        document.getElementById("timerMode")
        .checked;

    document.getElementById("timerInputBox")
    .style.display =
        checked ? "block" : "none";
}

function deleteFromSetup(){

    if(confirm("Delete current game?")){

        deleteEverything();
    }
}

/* =========================================================
   ROWS
========================================================= */

function refreshRowTitles(){

    document
    .querySelectorAll(".row")
    .forEach((row,index)=>{

        row.querySelector(".rowTitle")
        .innerHTML =
            `Screen ${index + 1}`;
    });
}

function addRow(data={}){

    const rows =
        document.getElementById("rows");

    const div =
        document.createElement("div");

    div.className = "row";

    div.innerHTML = `

        <div class="rowTitle"></div>

        <textarea
            class="hintInput"
            placeholder="Main Hint"
        >${data.hint || ""}</textarea>

        <textarea
            class="bonusInput"
            placeholder="Bonus Hint"
        >${data.bonus || ""}</textarea>

        <input
            type="text"
            class="codeInput"
            placeholder="Secret Code"
            value="${data.code || ""}"
        >

        <input
            type="file"
            class="imageInput"
            accept="image/*"
        >

        <img
			class="previewImg ${
				data.image &&
				data.image !== "undefined" &&
				data.image.trim() !== ""
				? ""
				: "hidden"
			}"

			src="${
				data.image &&
				data.image !== "undefined" &&
				data.image.trim() !== ""
				? data.image
				: ""
			}"
		>

        <button
            class="danger"
            onclick="removeRow(this)"
        >
            Remove
        </button>
    `;

    rows.appendChild(div);

    const imageInput =
        div.querySelector(".imageInput");

    const preview =
        div.querySelector(".previewImg");

    imageInput.onchange = function(e){

        const file = e.target.files[0];

        if(!file) return;

        preview.src =
            URL.createObjectURL(file);

        preview.classList.remove("hidden");
    };

    refreshRowTitles();
}

function removeRow(btn){

    btn.parentElement.remove();

    refreshRowTitles();
}

/* =========================================================
   IMAGE COMPRESSION
========================================================= */

function compressImage(file){

    return new Promise(resolve=>{

        const reader =
            new FileReader();

        reader.onload = function(e){

            const img =
                new Image();

            img.onload = function(){

                const canvas =
                    document.createElement("canvas");

                const maxWidth = 900;

                let width =
                    img.width;

                let height =
                    img.height;

                if(width > maxWidth){

                    height *=
                        maxWidth / width;

                    width = maxWidth;
                }

                canvas.width = width;
                canvas.height = height;

                const ctx =
                    canvas.getContext("2d");

                ctx.drawImage(
                    img,
                    0,
                    0,
                    width,
                    height
                );

                const compressed =
                    canvas.toDataURL(
                        "image/jpeg",
                        0.7
                    );

                resolve(compressed);
            };

            img.src = e.target.result;
        };

        reader.readAsDataURL(file);
    });
}

/* =========================================================
   SAVE GAME
========================================================= */

async function saveGame(){

    const rows =
        document.querySelectorAll(".row");

    if(rows.length === 0){

        alert("Add at least one screen");

        return;
    }

    settings = {

        totalHints:
            parseInt(
                document.getElementById("hintCount")
                .value
            ) || 0,

        timerEnabled:
            document.getElementById("timerMode")
            .checked,

        gameMinutes:
            parseInt(
                document.getElementById("gameMinutes")
                .value
            ) || 30
    };

    localStorage.setItem(
        SETTINGS_KEY,
        JSON.stringify(settings)
    );

    const arr = [];

    for(const row of rows){

        const hint =
            row.querySelector(".hintInput")
            .value
            .trim();

        const bonus =
            row.querySelector(".bonusInput")
            .value
            .trim();

        const code =
            row.querySelector(".codeInput")
            .value
            .trim();

        const existingImg =
			row
			.querySelector(".previewImg")
			.getAttribute("src") || "";

        const file =
            row.querySelector(".imageInput")
            .files[0];

        if(hint === "" &&
           !file &&
           existingImg === ""){

            alert("Each screen needs hint or image");

            return;
        }

        if(code === ""){

            alert("Every screen needs code");

            return;
        }

        let finalImage = existingImg;

        if(file){

            finalImage =
                await compressImage(file);
        }

        arr.push({

            hint,
            bonus,
            code,
            image:finalImage
        });
    }

    finishSave(arr);
}

function finishSave(arr){

    gameData = arr;

    progress = 0;
    usedHints = 0;
    gameStarted = false;
    screenHintsUsed = {};

    timerSeconds =
        settings.timerEnabled
        ? settings.gameMinutes * 60
        : 0;

    localStorage.setItem(
        GAME_KEY,
        JSON.stringify(arr)
    );

    localStorage.setItem(
        PROGRESS_KEY,
        "0"
    );

    localStorage.setItem(
        HINT_KEY,
        "0"
    );

    localStorage.setItem(
        TIMER_KEY,
        timerSeconds
    );

    localStorage.setItem(
        STARTED_KEY,
        "false"
    );

    localStorage.setItem(
        SCREEN_HINTS_KEY,
        JSON.stringify(screenHintsUsed)
    );

    showStartScreen();
}

/* =========================================================
   START SCREEN
========================================================= */

function showStartScreen(){

    app.innerHTML = `

        <div class="complete">
            🕵️
        </div>

        <div class="title">
            Escape Hunt
        </div>

        <div class="subtitle">

            ${gameData.length}
            Secret Challenges Await

        </div>

        <button
            class="primary"
            onclick="startGame()"
        >
            START GAME
        </button>

        <button
            class="secondary"
            onclick="toggleMusic()"
        >
            ${
                !bgMusic.paused
                ? "🔇 Music OFF"
                : "🔊 Music ON"
            }
        </button>
    `;
}

function startGame(){

    gameStarted = true;

    localStorage.setItem(
        STARTED_KEY,
        "true"
    );

	bgMusic.load();
    startMusic();

    loadGame();

    startTimer();
}

/* =========================================================
   GAMEPLAY
========================================================= */

function loadGame(){

    if(progress >= gameData.length){

        stopTimer();

        app.innerHTML = `

            <div class="complete">
                🎉
            </div>

            <div class="title">
                Hunt Completed
            </div>

            <div class="subtitle">

                ${
                    settings.timerEnabled
                    ? `Time Remaining:
                       ${formatTime(timerSeconds)}`
                    : `Completed In:
                       ${formatTime(timerSeconds)}`
                }

                <br><br>

                Hints Used:
                ${usedHints}

            </div>

            <button
                class="primary"
                onclick="restartGame()"
            >
                Restart Game
            </button>
        `;

        return;
    }

    const current =
        gameData[progress];

    app.innerHTML = `

        <div class="topbar">

            <div
                class="stat"
                id="timerDisplay"
            >
                ⏳ 00:00
            </div>

            <div class="stat">

                💡
                ${
                    settings.totalHints
                    - usedHints
                }

            </div>

            <div
                class="stat musicBtn"
                onclick="toggleMusic()"
            >
                ${
                    !bgMusic.paused
                    ? "🔊"
                    : "🔇"
                }
            </div>

        </div>

        <div class="title">
            Secret Hint
        </div>

        <div class="hintBox">

            ${
				current.image &&
				current.image !== "undefined" &&
				current.image.trim() !== ""

				? `
				<img
					src="${current.image}"
					class="hintImage"
				>
				`
				: ""
			}

            ${current.hint || ""}

            <div id="bonusContainer">

                ${
                    screenHintsUsed[progress]
                    ? `
                    <div class="bonusHint">
                        💡 ${current.bonus}
                    </div>
                    `
                    : ""
                }

            </div>

        </div>

        <input
            type="text"
            id="codeInput"
            placeholder="Enter Secret Code"
        >

        <button
            class="primary"
            onclick="checkCode()"
        >
            Unlock
        </button>

        <button
            class="secondary"
            onclick="useHint()"

            ${
                screenHintsUsed[progress]
                ? "disabled"
                : ""
            }
        >

            ${
                screenHintsUsed[progress]
                ? "Hint Used"
                : "Use Hint"
            }

        </button>

        <div
            id="msg"
            class="message"
        ></div>
    `;

    updateTimer();
}

function useHint(){

    if(screenHintsUsed[progress]){

        return;
    }

    if(
        usedHints >=
        settings.totalHints
    ){

        alert("No hints left");

        return;
    }

    const current =
        gameData[progress];

    if(!current.bonus){

        alert("No bonus hint");

        return;
    }

    usedHints++;

    screenHintsUsed[progress] = true;

    localStorage.setItem(
        HINT_KEY,
        usedHints
    );

    localStorage.setItem(
        SCREEN_HINTS_KEY,
        JSON.stringify(screenHintsUsed)
    );

    loadGame();
}

function checkCode(){

    const input =
        document.getElementById("codeInput")
        .value
        .trim();

    const current =
        gameData[progress];

    const msg =
        document.getElementById("msg");

    // CASE INSENSITIVE CHECK
    if(
        input.toLowerCase()
        ===
        current.code.toLowerCase()
    ){

        successSound();

        msg.className =
            "message success";

        msg.innerHTML =
            "Correct Secret Code";

        progress++;

        localStorage.setItem(
            PROGRESS_KEY,
            progress
        );

        setTimeout(()=>{
            loadGame();
        },700);

    }else{

        wrongSound();

        msg.className =
            "message error";

        // =========================================
        // AUTO DETECT CODE TYPE + LENGTH
        // =========================================

        const actualCode =
            current.code.trim();

        const isNumber =
            /^\d+$/.test(actualCode);

        let toastText = "";

        if(isNumber){

            toastText =
                `Wrong Secret Code<br>
                <small>
                Code is ${actualCode.length} digit number
                </small>`;

        }else{

            toastText =
                `Wrong Secret Code<br>
                <small>
                Code is ${actualCode.length} letter alphabet
                </small>`;
        }

        msg.innerHTML = toastText;
    }
}

/* =========================================================
   TIME OVER
========================================================= */

function showTimeOver(){

    app.innerHTML = `

        <div class="complete">
            ⏳
        </div>

        <div class="title">
            TIME OVER
        </div>

        <div class="subtitle">
            You failed to complete the hunt
        </div>

        <button
            class="primary"
            onclick="restartGame()"
        >
            Restart Game
        </button>
    `;
}

/* =========================================================
   RESTART
========================================================= */

function restartGame(){

    stopTimer();

    progress = 0;
    usedHints = 0;
    gameStarted = true;
    screenHintsUsed = {};

    timerSeconds =
        settings.timerEnabled
        ? settings.gameMinutes * 60
        : 0;

    localStorage.setItem(
        PROGRESS_KEY,
        "0"
    );

    localStorage.setItem(
        HINT_KEY,
        "0"
    );

    localStorage.setItem(
        TIMER_KEY,
        timerSeconds
    );

    localStorage.setItem(
        STARTED_KEY,
        "true"
    );

    localStorage.setItem(
        SCREEN_HINTS_KEY,
        JSON.stringify({})
    );

    loadGame();

    startTimer();
}

/* =========================================================
   EXPORT
========================================================= */

function exportGame(){

    const password =
        prompt("Enter export password");

    if(!password) return;

    const exportData = {

        pin:savedPin,
        settings:settings,
        screens:gameData
    };

    const encrypted =
        CryptoJS.AES.encrypt(
            JSON.stringify(exportData),
            password
        ).toString();

    const blob =
        new Blob(
            [encrypted],
            {
                type:"text/plain"
            }
        );

    const url =
        URL.createObjectURL(blob);

    const a =
        document.createElement("a");

    a.href = url;

    a.download =
        "escape-hunt.ehunt";

    a.click();

    URL.revokeObjectURL(url);
}

/* =========================================================
   IMPORT
========================================================= */

function triggerImport(){

    document.getElementById("importFile")
    .click();
}

document.getElementById("importFile")
.addEventListener("change",function(e){

    const file = e.target.files[0];

    if(!file) return;

    const password =
        prompt("Enter import password");

    if(!password) return;

    const reader =
        new FileReader();

    reader.onload = function(event){

        try{

            const decrypted =
                CryptoJS.AES.decrypt(
                    event.target.result,
                    password
                );

            const json =
                decrypted.toString(
                    CryptoJS.enc.Utf8
                );

            if(!json){

                alert("Wrong password");

                return;
            }

            const data =
                JSON.parse(json);

            if(
                !data.screens ||
                !Array.isArray(data.screens)
            ){

                alert("Invalid game file");

                return;
            }

            gameData =
                data.screens || [];

            settings =
                data.settings || {};

            savedPin =
                data.pin || "";

            progress = 0;
            usedHints = 0;
            gameStarted = false;
            screenHintsUsed = {};

            timerSeconds =
                settings.timerEnabled
                ? settings.gameMinutes * 60
                : 0;

            localStorage.setItem(
                GAME_KEY,
                JSON.stringify(gameData)
            );

            localStorage.setItem(
                SETTINGS_KEY,
                JSON.stringify(settings)
            );

            localStorage.setItem(
                PIN_KEY,
                savedPin
            );

            localStorage.setItem(
                PROGRESS_KEY,
                "0"
            );

            localStorage.setItem(
                HINT_KEY,
                "0"
            );

            localStorage.setItem(
                TIMER_KEY,
                timerSeconds
            );

            localStorage.setItem(
                STARTED_KEY,
                "false"
            );

            localStorage.setItem(
                SCREEN_HINTS_KEY,
                JSON.stringify({})
            );

            alert("Game Imported");

            showStartScreen();

        }catch(err){

            alert("Invalid file/password");
        }
    };

    reader.readAsText(file);
});

/* =========================================================
   DELETE EVERYTHING
========================================================= */

function deleteEverything(){

    stopTimer();
    stopMusic();

    localStorage.clear();

    gameData = [];
    settings = {};
    savedPin = "";
    progress = 0;
    usedHints = 0;
    timerSeconds = 0;
    gameStarted = false;
    screenHintsUsed = {};

    closeDeleteModal();
    closeModal();

    createPinScreen();
}
